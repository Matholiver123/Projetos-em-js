<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Separar os pares dos impares</title>
</head>
<body>
    <script>
        const numeros = [3, 8, 15, 22, 10, 7];

for (let i = 0; i < numeros.length; i++) {
  if (numeros[i] % 2 === 0) {
    console.log("Número par:", numeros[i]);
  }
}
    </script>
</body>
