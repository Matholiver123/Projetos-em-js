<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contagem While</title>
</head>
<body>
    <script>
        let numero = Number(prompt("Digite um número: "));

        while(numero <= 10){
            console.log(numero);
            numero++;
        }
    </script>
</body>
</html>
