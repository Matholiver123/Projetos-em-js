<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de dados</title>
</head>
<body>
    <script>
      const nomes = ["Carlos", "Ana", "Bruno", "Juliana"];

const resultado = nomes.find(nome => nome === "Bruno");

if (resultado) {
  console.log("Nome encontrado:", resultado);
} else {
  console.log("Nome não encontrado");
}  
    </script>
</body>
</html>
