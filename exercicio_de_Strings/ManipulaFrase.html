<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métodos de String</title>
</head>
<body>
    <script>
        let frase = prompt("Digite uma frase:");

        console.log("Frase maiúscula: " + frase.toUpperCase());
        console.log("Frase minúscula: " + frase.toLowerCase());
        console.log("Tamanho da frase: " + frase.length);
    </script>
</body>
</html>
