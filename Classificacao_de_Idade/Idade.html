    <title>Classificação de idade</title>
</head>
<body>
    <script>
        let idade = prompt("Digite sua idade: ");

        idade = Number(idade);

        if (idade < 18) {
    console.log("Menor de idade");
}
else if (idade >= 18 && idade <= 59) {
    console.log("Adulto");
}
else {
    console.log("Idoso");
}

    </script>
</body>
