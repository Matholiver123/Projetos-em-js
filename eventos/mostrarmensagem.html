<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exibir mensagem</title>
</head>
<body>
    <button onclick="mostrarMensagem()">
        Clique aqui
    </button>
    <h2 id="resultado"></h2>
    <script>
       function mostrarMensagem(){
        document.getElementById("resultado").innerHTML = "Olá, mundo!";
        }
    </script>
</body>
</html>
