<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somar Números</title>
</head>
<body>

    <input id="n1" type="number" placeholder="Primeiro número">
    <input id="n2" type="number" placeholder="Segundo número">

    <button onclick="mostrarSoma()">
        Somar
    </button>

    <h2 id="resultado"></h2>

    <script>
        function somar(a, b){
            return a + b;
        }

        function mostrarSoma(){
            let n1 = Number(document.getElementById("n1").value);
            let n2 = Number(document.getElementById("n2").value);

            let resultado = somar(n1, n2);

            document.getElementById("resultado").innerHTML =
                "Resultado: " + resultado;
        }
    </script>

</body>
</html>
