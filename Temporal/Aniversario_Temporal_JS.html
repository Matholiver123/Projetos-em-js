<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniversário 10 dias</title>
</head>
<body>
    <script>
        const aniversario = Temporal.PlainDate.from("2007-11-25");

const aniversarioMais10Dias = aniversario.add({ days: 10 });

console.log("Aniversário:", aniversario.toString());
console.log("10 dias depois:", aniversarioMais10Dias.toString());

    </script>
</body>
</html>
