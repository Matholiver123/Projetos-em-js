<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>semaforo</title>
</head>
<body>
    <div id="semaforo"></div>

<button onclick="vermelho()">Vermelho</button>
<button onclick="amarelo()">Amarelo</button>
<button onclick="verde()">Verde</button>
<script>
    function vermelho(){
        let semaforo = document.getElementById("semaforo");
        semaforo.style.width = "100px";
        semaforo.style.height = "100px";
        semaforo.style.background = "red"
    }
    function amarelo(){
        let semaforo = document.getElementById("semaforo");
        semaforo.style.width = "100px";
        semaforo.style.height = "100px";
        semaforo.style.background = "yellow"
    }
    function verde(){
        let semaforo = document.getElementById("semaforo");
        semaforo.style.width = "100px";
        semaforo.style.height = "100px";
        semaforo.style.background = "green"
    }
    vermelho();
    amarelo();
    verde();

</script>
</body>
</html>
