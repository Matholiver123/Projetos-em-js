<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudando a cor do quadrado</title>

    <style>
       #quadrado{
    width:100px;
    height:100px;
    background:red;
    transition:1s;
}
    </style>
</head>
<body>

    <div id="quadrado"></div>

<button onclick="crescer()">
    Crescer
</button>
    <script>
        function crescer() {
            let quadrado = document.getElementById("quadrado");
            quadrado.style.width = "200px";
            quadrado.style.height = "200px";
            quadrado.style.background = "blue";

            
        }
    </script>

</body>
</html>
