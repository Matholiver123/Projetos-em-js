<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Motivacional</title>
</head>
<body>
    <h1 id="mensagemMotivacional">Clique para receber uma motivação</h1>
    <button onclick="mostrarMensagem()">
        Clique aqui

    </button>
    <script>
        function mostrarMensagem(){
            document.getElementById("mensagemMotivacional").innerHTML = "Acredite em si mesmo e todo o resto virá naturalmente.";
        }
    </script>
</body>
</html>
