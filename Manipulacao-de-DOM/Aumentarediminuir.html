<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Aumentar e Diminuir Fonte</title>
    </head>
    <body>
    
        <p id="texto">Olá DOM</p>
    
        <button onclick="aumentar()">
            +
        </button>
    
        <button onclick="diminuir()">
            -
        </button>
    
        <script>
            let tamanho = 16;
    
            function aumentar() {
                tamanho = tamanho + 2;
                document.getElementById("texto").style.fontSize = tamanho + "px";
            }
    
            function diminuir() {
                tamanho = tamanho - 2;
                document.getElementById("texto").style.fontSize = tamanho + "px";
            }
        </script>
    
    </body>
    </html>
