<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mudando a cor do quadrado</title>

    <style>
        #quadrado {
            width: 100px;
            height: 100px;
            background: red;
        }
    </style>
</head>
<body>

    <div id="quadrado"></div>

    <button onclick="mudarCor()">
        Cor
    </button>

    <script>
        function mudarCor() {
            let quadrado = document.getElementById("quadrado");
            quadrado.style.backgroundColor = "blue";
        }
    </script>

</body>
</html>
