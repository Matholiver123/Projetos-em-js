<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem do dia</title>
</head>
<body>
    <h1 id="Mensagemdodia">Bom dia!</h1>
    <button onclick="trocarTexto()">
        Trocar Texto
    </button>
    <script>
        function trocarTexto(){
            document.getElementById("Mensagemdodia").innerHTML = "Tenha um otima dia!";
        }
    </script>

</body>
</html>
