<html lang="pt-br">
<head>

<body>
    <h1 id="contador">0</h1>

<button onclick="somar()">
    +
</button>
<script>
    let contador = 0;
    function somar(){
        contador = contador + 1
        document.getElementById("contador").innerHTML = contador;
        console.log(contador);
    }

</script>
