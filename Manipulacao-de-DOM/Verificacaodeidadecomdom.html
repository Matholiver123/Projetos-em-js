<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar idade</title>
</head>
<body>
    <input id="idade">

    <button onclick="verificarIdade()">
        Enviar
    </button>

    <h2 id="resultado"></h2>
    <script>
       function verificarIdade() {
    let idade = document.getElementById("idade").value;

    if (idade === "") {
        document.getElementById("resultado").innerHTML = "O campo está vazio!";
    } else if (idade >= 18) {
        document.getElementById("resultado").innerHTML = "Você é maior de idade!";
    } else {
        document.getElementById("resultado").innerHTML = "Você é menor de idade!";
    }
}
    </script>
</body>
</html>
