<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Dias</title>
</head>
<body>
    <script>
    let hoje = new Date();

let proximoAno = hoje.getFullYear() + 1;
let anoNovo = new Date(proximoAno, 0, 1); 
let diferenca = anoNovo - hoje;
let diasFaltando = Math.ceil(diferenca / (1000 * 60 * 60 * 24));

console.log("Faltam " + diasFaltando + " dias para o Ano Novo");
</script>
</body>
</html>
