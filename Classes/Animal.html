<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=scr, initial-scale=1.0">
    <title>Classe Animal</title>
</head>
<body>
    <script>
        class Animal{
        constructor(nome){
            this.nome = nome;
        }

        falar(){
            console.log("Meu nome é: " + this.nome);
        }
    }

    let animal1 = new Animal("Rex");

    animal1.falar();
    </script>
</body>
