<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classe carro</title>
</head>
<body>
    <script>
          class Carro {
        constructor(marca, modelo){
            this.marca = marca;
            this.modelo = modelo;
        }
    }

    let carro1 = new Carro("Toyota", "Corolla");

    console.log(carro1.marca);
    console.log(carro1.modelo);
    </script>
</body>
</html>
