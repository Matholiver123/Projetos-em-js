<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu sistema</title>
</head>
<body>
    <script>
    let opcao = prompt("Digite uma opção:\n1-Ver saldo\n2-Sacar\n3-Depositar\n4-Sair");

switch (opcao) {
    case "1":
        console.log("Seu saldo é R$ 1000");
        break;

    case "2":
        console.log("Saque realizado!");
        break;

    case "3":
        console.log("Depósito realizado!");
        break;

    case "4":
        console.log("Saindo do sistema...");
        break;

    default:
        console.log("Opção inválida!");
}
</script>

</body>
</html>
