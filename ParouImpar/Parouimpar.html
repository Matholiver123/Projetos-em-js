<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Par ou Ímpar</title>
</head>
<body>
    <script>
        let numero = prompt("Digite um número:");
        numero = Number(numero);

        let resultado = (numero % 2 == 0) ? "Par" : "Ímpar";

        console.log("Número: " + numero);
        console.log("Resultado: " + resultado);
    </script>
</body>
</html>
