<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operadores Bitwise</title>
</head>
<body>
    <script>
    let a = 5;  
    let b = 3;  
console.log(a & b);  
console.log(a | b);  
console.log(a ^ b);  
console.log(~a);     
console.log(a << 1); 
console.log(a >> 1); 
</script>
</body>
</html>
